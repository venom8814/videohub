{% extends "base.html" %}
{% block title %}Редактировать профиль — VideoHub{% endblock %}

{% block content %}
<div class="auth-box" style="max-width:480px;">
    <h2>Редактировать профиль</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="form-errors">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'profile' username=user.username %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
